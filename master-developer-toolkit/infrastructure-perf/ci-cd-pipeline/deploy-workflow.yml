# ---------------------------------------------------------------------------
# .github/workflows/deploy-workflow.yml
# Parallel CI/CD: lint + typecheck + test run concurrently, then a single build
# job produces and pushes a multi-arch image, gated on all checks passing.
# Uses pnpm + turbo remote-cache-friendly setup and least-privilege tokens.
# ---------------------------------------------------------------------------
name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20.18.0"
  PNPM_VERSION: "9.12.0"

jobs:
  setup:
    name: Install & cache
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

  quality:
    name: ${{ matrix.task }}
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        task: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run ${{ matrix.task }}
        run: pnpm run ${{ matrix.task }}
      - name: Upload coverage
        if: matrix.task == 'test'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore
          retention-days: 7

  build-image:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure-perf/docker-orchestration/Dockerfile.prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy (production)
    runs-on: ubuntu-latest
    needs: build-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - name: Trigger rollout
        env:
          DEPLOY_WEBHOOK: ${{ secrets.DEPLOY_WEBHOOK }}
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_WEBHOOK:-}" ]; then
            echo "::warning::DEPLOY_WEBHOOK secret not set; skipping rollout trigger"
            exit 0
          fi
          curl --fail --silent --show-error \
               --retry 3 --retry-delay 5 \
               -X POST "$DEPLOY_WEBHOOK" \
               -H 'Content-Type: application/json' \
               -d "{\"image_tag\":\"${IMAGE_TAG}\",\"ref\":\"${GITHUB_SHA}\"}"
      - name: Smoke test
        env:
          HEALTH_URL: ${{ secrets.HEALTH_URL }}
        run: |
          set -euo pipefail
          if [ -z "${HEALTH_URL:-}" ]; then
            echo "::warning::HEALTH_URL not set; skipping smoke test"
            exit 0
          fi
          for i in $(seq 1 10); do
            if curl --fail --silent "$HEALTH_URL"; then echo "healthy"; exit 0; fi
            echo "attempt $i: not healthy yet; retrying"; sleep 10
          done
          echo "::error::service failed health check after rollout"; exit 1
